<h1 class="text-center m-2 text-green-500 font-bold text-xl">{{title}}</h1>
<img [src]="url"/>

<button (click)="download(url)" class="cursor-pointer border-2 border-green-500 text-green-500 hover:bg-green-50 hover:scale-[1.01] shadow-lg rounded-lg text-center self-start px-3 py-2 my-2 mx-2">
    <i class="fa-solid fa-download"></i>
    Télecharger l'image
</button>
